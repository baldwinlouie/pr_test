name: 'PR Title Validation'

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-slim
    permissions:
      pull-requests: write
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Requires: '#' -> digits -> space -> an uppercase letter -> the rest of the description
          subjectPattern: '^#\d+ [A-Z].*$'
          
          # Updated error message to explicitly mention the uppercase requirement
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}" didn't match the configured pattern. 
            Please ensure that your PR title follows the format: <type>: #ISSUE_NUMBER <Description>
            The description MUST start with an uppercase letter.
            Example: feat: #123 Add new feature
      # Post a comment if the validation failed
      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            Hey there! 👋 It looks like your PR title needs a quick adjustment.
            
            Details:
            ```text
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

      # Delete the comment once the user fixes the title
      - if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-title-lint-error
          delete: true
