name: 'Lint PR'

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Changed to 'write' so the bot can post comments
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        id: lint_pr_title # Added an ID so we can reference this step's outputs later
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: '^#\d+ [A-Z].*$'
          subjectPatternError: |
            The subject of your PR title is not formatted correctly.
            
            **Current Subject:** `{subject}`
            **Expected Format:** `#<Issue Number> <Description starting with Uppercase>`

      # Post a comment if the validation failed
      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            ### 🛠️ Quick Title Fix Required
            
            Your PR title needs to be updated to match our project's format:
            `type: #IssueNumber Description`

            **Your specific error:**
            > ${{ steps.lint_pr_title.outputs.error_message }}

            **Correct Examples:**
            - `feat: #123 Add new feature`
            - `fix(api): #234 Fix connection bug`
            - `docs: #45 Update README documentation`

            ---
            *Note: This project follows the **Conventional Commit** specification.*
            *💡 You can edit the PR title directly in the GitHub UI to fix this.*

      # Delete the comment once the user fixes the title
      - if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-title-lint-error
          delete: true
