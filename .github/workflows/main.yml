name: 'Lint PR'

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Changed to 'write' so the bot can post comments
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        id: lint_pr_title # Added an ID so we can reference this step's outputs later
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          subjectPattern: '^#\d+ [A-Z].*$'
          subjectPatternError: |
            The subject "{subject}" found in the pull request "{title}" doesn't follow the Conventional Commit specification. 
            
            Please ensure that your PR title follows the format: <type>: <#Issue Number> <Description>
            
            The description MUST start with an uppercase letter.
            
            Examples: 
              - feat: #123 Add new feature
              - fix: #234 Fix bug in component
              - feat(api)!: #987 Updated core library

      # Post a comment if the validation failed
      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            👋 It looks like your PR title needs a quick adjustment.

            ${{ steps.lint_pr_title.outputs.error_message }}

      # Delete the comment once the user fixes the title
      - if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-title-lint-error
          delete: true
